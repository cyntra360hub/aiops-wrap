name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tooling
        run: pip install ruff mypy

      - name: Install package (for mypy import resolution)
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: mypy
        run: mypy src

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

  pipx-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipx
        run: python -m pip install pipx

      - name: pipx install from local source
        run: pipx install .

      - name: aiops --version
        run: aiops --version

      - name: aiops wrap runs a trivial command and forwards its exit code
        run: |
          aiops wrap -- python -c "print('hello from wrapped command')"
          if aiops wrap -- python -c "import sys; sys.exit(5)"; then
            echo "expected non-zero exit code" && exit 1
          fi
